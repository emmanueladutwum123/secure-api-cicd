name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------------
  # 1. Tests + coverage
  # -------------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=app --cov-report=term-missing --cov-fail-under=80

  # -------------------------------------------------------------------------
  # 2. Lint
  # -------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        run: pip install flake8

      - name: flake8
        run: flake8 app/ --max-line-length=120

  # -------------------------------------------------------------------------
  # 3. Security scan (bandit)
  # -------------------------------------------------------------------------
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        # -ll = only medium/high severity; -ii = only medium/high confidence
        run: bandit -r app/ -ll -ii

  # -------------------------------------------------------------------------
  # 4. Docker build + smoke test (main branch only)
  # -------------------------------------------------------------------------
  docker:
    name: Docker smoke test
    needs: [test, lint, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t secure-api .

      - name: Run container smoke test
        run: |
          docker run -d -p 8000:8000 --name test-api secure-api
          sleep 5
          curl -f http://localhost:8000/health
          curl -f -o /dev/null -w "%{http_code}" \
            -H "X-API-Key: tesla-security-demo-key-2026" \
            http://localhost:8000/events/stats
          docker stop test-api
